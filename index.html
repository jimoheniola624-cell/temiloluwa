<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Be My Girlfriend?</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: 'Poppins', sans-serif;
    }

    body{
        height:100vh;
        overflow:hidden;
        display:flex;
        justify-content:center;
        align-items:center;
        background: linear-gradient(135deg, #ff4b91, #ff85a2, #ffd6e0);
        position:relative;
    }

    .container{
        text-align:center;
        background: rgba(255,255,255,0.15);
        padding:50px;
        border-radius:25px;
        backdrop-filter: blur(10px);
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
        z-index:2;
    }

    h1{
        color:white;
        font-size:3rem;
        margin-bottom:15px;
    }

    p{
        color:white;
        font-size:1.2rem;
        margin-bottom:35px;
    }

    .buttons{
        position:relative;
        width:300px;
        height:100px;
        margin:auto;
    }

    button{
        border:none;
        padding:15px 30px;
        font-size:1rem;
        border-radius:50px;
        cursor:pointer;
        transition:0.3s;
        position:absolute;
    }

    #yesBtn{
        background:white;
        color:#ff4b91;
        left:20px;
    }

    #yesBtn:hover{
        transform:scale(1.1);
    }

    #noBtn{
        background:#ff1e63;
        color:white;
        right:20px;
    }

    .heart{
        position:absolute;
        color:white;
        font-size:20px;
        animation: floatUp linear infinite;
        opacity:0.7;
    }

    @keyframes floatUp{
        from{
            transform:translateY(100vh) scale(0);
        }
        to{
            transform:translateY(-10vh) scale(1);
        }
    }

    .love-message{
        display:none;
        margin-top:25px;
        color:white;
        font-size:1.5rem;
        animation: pop 0.5s ease;
    }

    @keyframes pop{
        0%{
            transform:scale(0);
        }
        100%{
            transform:scale(1);
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>Hey Beautiful 💖</h1>
    <p>
        Every moment with you feels special...<br>
        So I have one important question 👀
    </p>

    <h1>Will You Be My Girlfriend?</h1>

    <div class="buttons">
        <button id="yesBtn">YES 💕</button>
        <button id="noBtn">NO 😭</button>
    </div>

    <div class="love-message" id="message">
        AHHH YOU SAID YES 💖🥹
    </div>
</div>

<script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const message = document.getElementById("message");

    // Move NO button
    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * 250;
        const y = Math.random() * 80;

        noBtn.style.left = `${x}px`;
        noBtn.style.top = `${y}px`;
    });

    // YES button clicked
    yesBtn.addEventListener("click", () => {
        message.style.display = "block";
        createHearts(40);
    });

    // Floating hearts
    function createHearts(count){
        for(let i=0; i<count; i++){
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "💖";

            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
            heart.style.fontSize = (Math.random() * 30 + 15) + "px";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
    }

    // Continuous hearts in background
    setInterval(() => {
        createHearts(2);
    }, 500);
</script>

</body>
</html>
