<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Site</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #ff4d88, #ff85a2, #ffd6e0);
    position:relative;
    padding:20px;
}

.container{
    width:100%;
    max-width:400px;
    text-align:center;
    background: rgba(255,255,255,0.15);
    padding:35px 25px;
    border-radius:25px;
    backdrop-filter: blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    z-index:2;
}

h1{
    color:white;
    font-size:2.2rem;
    margin-bottom:15px;
}

p{
    color:white;
    font-size:1.1rem;
    margin-bottom:30px;
    line-height:1.5;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

button{
    border:none;
    padding:15px 25px;
    font-size:1rem;
    border-radius:50px;
    cursor:pointer;
    transition:0.3s ease;
    min-width:120px;
}

#yesBtn{
    background:white;
    color:#ff4d88;
    font-weight:bold;
}

#yesBtn:hover{
    transform:scale(1.08);
}

#noBtn{
    background:#ff1e63;
    color:white;
    font-weight:bold;
}

.message{
    display:none;
    margin-top:30px;
    color:white;
    animation: pop 0.5s ease;
}

.message h2{
    font-size:2rem;
    margin-bottom:10px;
}

.message p{
    font-size:1.2rem;
}

.heart{
    position:absolute;
    color:white;
    animation:floatUp linear forwards;
    opacity:0.8;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh) scale(0);
        opacity:0;
    }

    to{
        transform:translateY(-10vh) scale(1);
        opacity:1;
    }
}

@keyframes pop{
    0%{
        transform:scale(0);
    }
    100%{
        transform:scale(1);
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>Temiloluwa 💖</h1>

    <p>
        You make everything feel brighter ✨<br><br>
        So I wanted to ask you something special...
    </p>

    <h1>Will You Be My Girlfriend?</h1>

    <div class="buttons">
        <button id="yesBtn">YES 💕</button>
        <button id="noBtn">NO 😭</button>
    </div>

    <div class="message" id="message">
        <h2>YAYYY 💖🥹</h2>
        <p>Will you go to the movie night with me? 🎬🍿</p>
    </div>

</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const message = document.getElementById("message");

// When she taps NO, it changes to YES
noBtn.addEventListener("click", () => {
    noBtn.innerHTML = "YES 💕";
    noBtn.style.background = "white";
    noBtn.style.color = "#ff4d88";
});

// YES button action
yesBtn.addEventListener("click", () => {
    message.style.display = "block";
    createHearts(50);
});

// If transformed NO button is clicked again
noBtn.addEventListener("dblclick", () => {
    message.style.display = "block";
    createHearts(50);
});

// Floating hearts effect
function createHearts(number){
    for(let i = 0; i < number; i++){

        const heart = document.createElement("div");
        heart.classList.add("heart");

        heart.innerHTML = "💖";

        heart.style.left = Math.random() * 100 + "vw";

        heart.style.fontSize = (Math.random() * 25 + 15) + "px";

        heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }
}

// Background hearts continuously
setInterval(() => {
    createHearts(2);
}, 700);
</script>

</body>
</html>
